<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ABZ GROUP</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="page-banner">
        <div class="container text-center">
            <h1>Đăng nhập</h1>
            <p>Chào mừng bạn quay trở lại</p>
        </div>
    </section>

    <main class="container">
        <div class="auth-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập hoặc Email</label>
                    <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập hoặc email">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="quen-mat-khau.html" class="forgot-link">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <button type="button" class="btn btn-google btn-full">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width: 18px; margin-right: 10px;">
                    Đăng nhập với Google
                </button>

                <p class="auth-link">Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/auth-state.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
