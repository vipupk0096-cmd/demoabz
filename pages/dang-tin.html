<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng tin - ABZ GROUP</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="page-banner">
        <div class="container text-center">
            <h1>Đăng tin bất động sản</h1>
            <p>Chia sẻ bất động sản của bạn với hàng nghìn người quan tâm</p>
        </div>
    </section>

    <main class="container">
        <div class="auth-form">
            <form id="postForm">
                <h2 style="text-align: center; margin-bottom: 30px; color: var(--dark);">Thông tin cơ bản</h2>

                <div class="form-group">
                    <label for="title">Tiêu đề tin đăng *</label>
                    <input type="text" id="title" name="title" required placeholder="VD: Bán biệt thự view hồ Tây">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Loại bất động sản *</label>
                        <select id="category" name="category" required>
                            <option value="">Chọn loại</option>
                            <option value="canho">Căn hộ chung cư</option>
                            <option value="nharieng">Nhà riêng</option>
                            <option value="bietthu">Biệt thự</option>
                            <option value="datnen">Đất nền</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Loại tin *</label>
                        <select id="type" name="type" required>
                            <option value="">Chọn loại tin</option>
                            <option value="ban">Bán</option>
                            <option value="thue">Cho thuê</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Giá (VNĐ) *</label>
                        <input type="number" id="price" name="price" required placeholder="VD: 5000000000">
                    </div>
                    <div class="form-group">
                        <label for="area">Diện tích (m²) *</label>
                        <input type="number" id="area" name="area" required placeholder="VD: 120">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bedrooms">Số phòng ngủ</label>
                        <input type="number" id="bedrooms" name="bedrooms" min="0">
                    </div>
                    <div class="form-group">
                        <label for="bathrooms">Số phòng tắm</label>
                        <input type="number" id="bathrooms" name="bathrooms" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Địa chỉ *</label>
                    <input type="text" id="address" name="address" required placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố">
                </div>

                <div class="form-group">
                    <label for="description">Mô tả chi tiết *</label>
                    <textarea id="description" name="description" rows="6" required placeholder="Mô tả chi tiết về bất động sản..."></textarea>
                </div>

                <div class="form-group">
                    <label for="images">Hình ảnh (tối đa 10 ảnh)</label>
                    <input type="file" id="images" name="images" multiple accept="image/*">
                    <small style="color: #6c757d;">Chọn nhiều ảnh bằng cách giữ Ctrl (Windows) hoặc Cmd (Mac)</small>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        Tôi cam kết thông tin đăng tải là đúng sự thật và tuân thủ <a href="#" target="_blank">Điều khoản sử dụng</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Đăng tin</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/auth-state.js"></script>
    <script src="../js/dataManager.js"></script>
    <script src="../js/post.js"></script>
</body>
</html>
