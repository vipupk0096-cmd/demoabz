<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ABZ GROUP</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="page-banner">
        <div class="container text-center">
            <h1>Đăng ký tài khoản</h1>
            <p>Tham gia cộng đồng bất động sản của chúng tôi</p>
        </div>
    </section>

    <main class="container">
        <div class="auth-form">
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Họ</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Tên</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required placeholder="Tên đăng nhập (4-20 ký tự)">
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        Tôi đồng ý với <a href="#" target="_blank">Điều khoản sử dụng</a> và <a href="#" target="_blank">Chính sách bảo mật</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Đăng ký</button>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <button type="button" class="btn btn-google btn-full">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width: 18px; margin-right: 10px;">
                    Đăng ký với Google
                </button>

                <p class="auth-link">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a></p>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/auth-state.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
